# Pi-safe single service template
# On a 906 MB Pi: one service, pinned tag, hard mem limit.
# Do NOT run multiple heavy services at once.

services:
  fileserver:
    image: halverneus/static-file-server:latest
    container_name: pi-fileserver
    mem_limit: 80m
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/web
    # Expose only over Tailscale, not the public internet:
    # bind to the Tailscale IP instead of 0.0.0.0 if you can.
