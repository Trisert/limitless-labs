<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk — Limitless Labs</title>
<link rel="stylesheet" href="/limitless-labs/style.css?v=3">
<style id="walk-inline-css">
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0d0f}
  #walk-canvas{position:fixed;inset:0;display:block;width:100%;height:100%}
  .walk-ui{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
  .walk-chip{background:rgba(11,13,15,.55);border:1px solid rgba(224,167,67,.25);color:#e6e6e6;padding:10px 14px;border-radius:999px;backdrop-filter:blur(6px);font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  .walk-chip .accent{color:#e0a743}
  .walk-hint{position:fixed;left:50%;top:16px;transform:translateX(-50%);color:#cfd3d6;background:rgba(11,13,15,.45);border:1px solid rgba(224,167,67,.18);padding:8px 12px;border-radius:10px;backdrop-filter:blur(6px);font:12px/1.3 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;z-index:10;opacity:.9}
  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0d0f;color:#e0a743;font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;z-index:20;transition:opacity .8s}
  .loading.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="walk-canvas" aria-label="Procedural infinite walk through a national park landscape"></canvas>
<div class="loading" id="loading">GENERATING WORLD...</div>
<div class="walk-hint">Click &amp; drag to look · Walk automatically · Scroll to adjust pace</div>
<div class="walk-ui">
  <div class="walk-chip">PACE <span class="accent" id="pace">1.0x</span></div>
  <div class="walk-chip">DIST <span class="accent" id="dist">0.00</span> <span style="opacity:.7">km</span></div>
  <div class="walk-chip">ELEV <span class="accent" id="elev">0</span> <span style="opacity:.7">m</span></div>
</div>

<script type="importmap">
{ "imports": { "three": "../vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('walk-canvas');
const loading = document.getElementById('loading');
const paceEl = document.getElementById('pace');
const distEl = document.getElementById('dist');
const elevEl = document.getElementById('elev');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
if (!renderer.capabilities.isWebGL2) {
  loading.textContent = 'WEBGL UNAVAILABLE — try a modern browser';
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.onerror = (e) => { console.error('WebGL error:', e); loading.textContent = 'RENDER ERROR — refresh'; };

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.5, 800);
camera.position.set(0, 4.2, 0);

// ============================================================
// SHADER: TERRAIN
// ============================================================
const terrainVertexShader = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vHeight;
varying vec2 vUv;
varying float vRoughness;
varying float vSlope;

uniform float uTime;

// value noise
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++) { v += a * noise(p); p *= 2.1; a *= 0.5; }
  return v;
}

float getHeight(vec2 p) {
  float h = 0.0;
  h += fbm(p * 0.007) * 30.0;
  h += fbm(p * 0.028 + 5.3) * 9.0;
  float ridge = 1.0 - abs(fbm(p * 0.011 + 1.7) * 2.0 - 1.0);
  h += ridge * 16.0;
  float valley = abs(noise(p * 0.003 + 99.0) * 2.0 - 1.0);
  h -= pow(valley, 4.0) * 18.0;
  return h;
}

void main() {
  vUv = uv;
  vec3 pos = position;
  float h = getHeight(pos.xz);
  pos.y += h;
  vHeight = h;
  vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;

  // compute normal from heightfield
  float eps = 0.5;
  float hL = getHeight(pos.xz + vec2(-eps, 0.0));
  float hR = getHeight(pos.xz + vec2( eps, 0.0));
  float hD = getHeight(pos.xz + vec2(0.0, -eps));
  float hU = getHeight(pos.xz + vec2(0.0,  eps));
  vec3 normal = normalize(vec3(hL - hR, 2.0 * eps, hD - hU));
  vNormal = normalize(normalMatrix * normal);
  vSlope = 1.0 - abs(normal.y);

  // micro displacement for granularity
  pos.y += fbm(pos.xz * 0.12) * 0.35;
  pos.y += noise(pos.xz * 0.6) * 0.08;

  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}
`;

const terrainFragmentShader = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vHeight;
varying vec2 vUv;
varying float vRoughness;
varying float vSlope;

uniform sampler2D uGrassTex;
uniform sampler2D uRockTex;
uniform sampler2D uDirtTex;
uniform sampler2D uSnowTex;
uniform vec3 uSunDir;
uniform float uTime;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.2; a *= 0.5; }
  return v;
}

void main() {
  vec3 N = normalize(vNormal);
  float h = vHeight;
  float t = clamp((h - 1.0) / 48.0, 0.0, 1.0);

  // biome blend
  float grassW = 1.0 - smoothstep(0.22, 0.55, t);
  float dirtW = smoothstep(0.28, 0.55, t) * (1.0 - smoothstep(0.55, 0.75, t));
  float rockW = smoothstep(0.48, 0.72, t) * (1.0 - smoothstep(0.72, 0.9, t));
  float snowW = smoothstep(0.78, 1.0, t);

  // slope influence: more rock/dirt on steep slopes
  float slope = vSlope;
  rockW += slope * 0.6;
  dirtW += slope * 0.3;
  grassW = max(0.0, grassW - slope * 0.7);

  // tiling sample with granular detail
  vec2 uv1 = vWorldPos.xz * 0.12;
  vec2 uv2 = vWorldPos.xz * 0.06;
  float detail = fbm(uv2 * 3.0 + uTime * 0.02) * 0.5;

  vec3 grass = texture2D(uGrassTex, uv1 + detail * 0.05).rgb;
  vec3 dirt  = texture2D(uDirtTex, uv1 * 1.1 + detail * 0.04).rgb;
  vec3 rock  = texture2D(uRockTex, uv1 * 0.9 + detail * 0.06).rgb;
  vec3 snow  = texture2D(uSnowTex, uv1 * 1.2 + detail * 0.03).rgb;

  vec3 col = grass * grassW + dirt * dirtW + rock * rockW + snow * snowW;

  // slope darkening / AO approximation
  col *= 1.0 - slope * 0.35;

  // micro shadow from noise
  float shadow = fbm(vWorldPos.xz * 0.25) * 0.15;
  col *= 1.0 - shadow;

  // lighting
  float NdotL = max(dot(N, normalize(uSunDir)), 0.0);
  float wrap = max(dot(N, normalize(uSunDir + vec3(0.0, 0.3, 0.0))), 0.0);
  vec3 ambient = vec3(0.18, 0.22, 0.28);
  vec3 diffuse = vec3(1.0, 0.95, 0.85) * (wrap * 0.7 + 0.3);
  col *= ambient + diffuse * NdotL;

  // roughness from slope
  float rough = 0.75 + slope * 0.2;

  gl_FragColor = vec4(col, 1.0);
}
`;

// ============================================================
// SHADER: WATER
// ============================================================
const waterVertexShader = `
varying vec2 vUv;
varying vec3 vWorldPos;
uniform float uTime;
void main() {
  vUv = uv;
  vec3 pos = position;
  pos.y += sin(pos.x * 0.3 + uTime * 0.6) * 0.15;
  pos.y += cos(pos.z * 0.25 + uTime * 0.5) * 0.15;
  vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}
`;
const waterFragmentShader = `
varying vec2 vUv;
varying vec3 vWorldPos;
uniform float uTime;
uniform vec3 uSunDir;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
void main() {
  vec3 deep = vec3(0.12, 0.25, 0.35);
  vec3 shallow = vec3(0.25, 0.45, 0.55);
  float n = noise(vWorldPos.xz * 0.08 + uTime * 0.15) * 0.5 + 0.5;
  vec3 col = mix(deep, shallow, n);
  float fresnel = pow(1.0 - abs(dot(vec3(0.0, 1.0, 0.0), normalize(vec3(0.0, 1.0, 0.0)))), 2.0);
  col += vec3(0.6, 0.7, 0.8) * fresnel * 0.25;
  gl_FragColor = vec4(col, 0.78);
}
`;

// ============================================================
// SHADER: SKY
// ============================================================
const skyVertexShader = `
varying vec3 vWorldPos;
void main() {
  vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;
const skyFragmentShader = `
varying vec3 vWorldPos;
uniform vec3 uSunDir;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.1; a *= 0.5; }
  return v;
}
void main() {
  vec3 dir = normalize(vWorldPos);
  float y = dir.y * 0.5 + 0.5;
  vec3 horizon = vec3(0.7, 0.75, 0.8);
  vec3 zenith = vec3(0.2, 0.35, 0.55);
  vec3 nadir = vec3(0.55, 0.5, 0.45);
  vec3 col = mix(nadir, mix(horizon, zenith, pow(y, 0.8)), step(0.0, dir.y));

  // sun glow
  float sun = max(dot(dir, normalize(uSunDir)), 0.0);
  col += vec3(1.0, 0.9, 0.7) * pow(sun, 64.0) * 0.8;
  col += vec3(1.0, 0.85, 0.7) * pow(sun, 8.0) * 0.2;

  // clouds
  float cloud = fbm(dir.xz / (dir.y + 0.3) * 1.5);
  cloud = smoothstep(0.45, 0.75, cloud);
  col = mix(col, vec3(0.95, 0.95, 0.98), cloud * 0.6);

  gl_FragColor = vec4(col, 1.0);
}
`;

// ============================================================
// MATERIALS
// ============================================================
// ============================================================
// TEXTURES — procedural, no external assets
// ============================================================
function makeTexture(size, fn) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(size, size);
  const d = img.data;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const i = (y * size + x) * 4;
      const [r, g, b, a] = fn(x / size, y / size);
      d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = a;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.generateMipmaps = true;
  tex.needsUpdate = true;
  return tex;
}
const grassTex = makeTexture(128, (u, v) => {
  const n = ((Math.sin(u*37.3+v*11.7)*0.5+0.5)*0.15 + (Math.sin(u*13.1+v*29.9)*0.5+0.5)*0.1 + 0.65);
  return [n*120+80, n*180+100, n*90+60, 255];
});
const dirtTex = makeTexture(128, (u, v) => {
  const n = ((Math.sin(u*23.7+v*41.1)*0.5+0.5)*0.2 + (Math.sin(u*57.3+v*19.3)*0.5+0.5)*0.15 + 0.55);
  return [n*140+80, n*100+60, n*70+40, 255];
});
const rockTex = makeTexture(128, (u, v) => {
  const n = ((Math.sin(u*53.1+v*31.7)*0.5+0.5)*0.25 + (Math.sin(u*17.9+v*47.3)*0.5+0.5)*0.2 + 0.45);
  return [n*130+80, n*120+70, n*110+60, 255];
});
const snowTex = makeTexture(128, (u, v) => {
  const n = ((Math.sin(u*31.3+v*23.1)*0.5+0.5)*0.08 + 0.88);
  return [n*255, n*252, n*255, 255];
});

const sunDir = new THREE.Vector3(200, 140, -90).normalize();

const terrainMaterial = new THREE.ShaderMaterial({
  vertexShader: terrainVertexShader,
  fragmentShader: terrainFragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uSunDir: { value: sunDir },
    uGrassTex: { value: grassTex },
    uDirtTex: { value: dirtTex },
    uRockTex: { value: rockTex },
    uSnowTex: { value: snowTex },
  },
});

const waterMaterial = new THREE.ShaderMaterial({
  vertexShader: waterVertexShader,
  fragmentShader: waterFragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uSunDir: { value: sunDir },
  },
  transparent: true,
});

const skyMaterial = new THREE.ShaderMaterial({
  vertexShader: skyVertexShader,
  fragmentShader: skyFragmentShader,
  uniforms: {
    uSunDir: { value: sunDir },
  },
  side: THREE.BackSide,
});

// ============================================================
// SCENE OBJECTS
// ============================================================
const skyGeo = new THREE.SphereGeometry(400, 32, 32);
const skyMesh = new THREE.Mesh(skyGeo, skyMaterial);
scene.add(skyMesh);

const CHUNK = 96;
const SEG = 64;
const chunks = new Map();
function chunkKey(cx, cz) { return `${cx},${cz}`; }
function ensureChunk(cx, cz) {
  const key = chunkKey(cx, cz);
  if (chunks.has(key)) return;
  const geom = new THREE.PlaneGeometry(CHUNK, CHUNK, SEG, SEG);
  geom.rotateX(-Math.PI / 2);
  const mesh = new THREE.Mesh(geom, terrainMaterial);
  mesh.position.set(cx * CHUNK, 0, cz * CHUNK);
  scene.add(mesh);
  chunks.set(key, mesh);
}
function removeChunk(cx, cz) {
  const key = chunkKey(cx, cz);
  const mesh = chunks.get(key);
  if (!mesh) return;
  scene.remove(mesh);
  mesh.geometry.dispose();
  chunks.delete(key);
}
const CHUNKS_RADIUS = 2;
for (let x = -CHUNKS_RADIUS; x <= CHUNKS_RADIUS; x++)
  for (let z = -CHUNKS_RADIUS; z <= CHUNKS_RADIUS; z++) ensureChunk(x, z);

const waterGeo = new THREE.PlaneGeometry(CHUNK * 6, CHUNK * 6);
waterGeo.rotateX(-Math.PI / 2);
const water = new THREE.Mesh(waterGeo, waterMaterial);
water.position.y = 2.8;
scene.add(water);

// ============================================================
// VEGETATION — instanced
// ============================================================
const trunkGeom = new THREE.CylinderGeometry(0.22, 0.36, 2.6, 6);
const foliageGeom = new THREE.ConeGeometry(1.5, 4.2, 7, 1);
const foliageAltGeom = new THREE.ConeGeometry(1.2, 3.4, 6, 1);
const trunkMat = new THREE.MeshStandardMaterial({ color: '#4a3b2f', roughness: 0.94 });
const foliageMats = [
  new THREE.MeshStandardMaterial({ color: '#2f4025', roughness: 0.86 }),
  new THREE.MeshStandardMaterial({ color: '#3a4f30', roughness: 0.86 }),
  new THREE.MeshStandardMaterial({ color: '#263820', roughness: 0.9 }),
  new THREE.MeshStandardMaterial({ color: '#4a5a3a', roughness: 0.84 }),
];

const MAX_TREES = 6000;
const trunkInstanced = new THREE.InstancedMesh(trunkGeom, trunkMat, MAX_TREES);
const foliageInstanced = new THREE.InstancedMesh(foliageGeom, foliageMats[0], MAX_TREES * 2);
trunkInstanced.castShadow = false;
foliageInstanced.castShadow = false;
scene.add(trunkInstanced);
scene.add(foliageInstanced);

const dummy = new THREE.Object3D();
const treeData = [];
function sampleHeightJS(x, z) {
  let h = 0;
  const hash = (a, b) => { let n = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453; return n - Math.floor(n); };
  const smooth = t => t*t*t*(t*(t*6-15)+10);
  const lerp = (a, b, t) => a + (b - a) * t;
  const noise = (x, z) => {
    const ix = Math.floor(x), iz = Math.floor(z);
    const fx = smooth(x - ix), fz = smooth(z - iz);
    return lerp(lerp(hash(ix, iz), hash(ix+1, iz), fx), lerp(hash(ix, iz+1), hash(ix+1, iz+1), fx), fz);
  };
  const fbm = (x, z, oct = 4) => { let v = 0, a = 0.5, f = 1; for (let i = 0; i < oct; i++) { v += a * noise(x*f, z*f); a *= 0.5; f *= 2.15; } return v; };
  h += fbm(x * 0.0075, z * 0.0075, 4) * 30;
  h += fbm(x * 0.032 + 5.3, z * 0.032 + 9.1, 3) * 9;
  const ridge = 1 - Math.abs(fbm(x * 0.012 + 1.7, z * 0.012 + 3.2, 3) * 2 - 1);
  h += ridge * 16;
  const valley = Math.abs(noise(x * 0.0035 + 99, z * 0.0035 + 77) * 2 - 1);
  h -= Math.pow(valley, 4) * 18;
  return h;
}
function addTree(x, z) {
  const h = sampleHeightJS(x, z);
  if (h < 3.8 || h > 28) return;
  const s = 0.6 + Math.random() * 1.6;
  const rot = Math.random() * Math.PI * 2;
  const matIdx = Math.floor(Math.random() * foliageMats.length);
  const wide = Math.random() > 0.45;
  treeData.push({ x, z, h, s, rot, matIdx, wide });
}
function buildInstancedTrees() {
  let ti = 0, fi = 0;
  for (const t of treeData) {
    if (ti >= MAX_TREES) break;
    dummy.position.set(t.x, t.h, t.z);
    dummy.scale.setScalar(t.s);
    dummy.rotation.y = t.rot;
    dummy.updateMatrix();
    trunkInstanced.setMatrixAt(ti++, dummy.matrix);
    dummy.position.set(t.x, t.h + 1.3, t.z);
    dummy.scale.setScalar(t.s);
    dummy.rotation.y = t.rot;
    dummy.updateMatrix();
    foliageInstanced.setMatrixAt(fi++, dummy.matrix);
    dummy.position.set(t.x, t.h + 3.4, t.z);
    dummy.scale.setScalar(t.wide ? t.s * 1.0 : t.s * 0.72);
    dummy.rotation.y = t.rot + 0.45;
    dummy.updateMatrix();
    foliageInstanced.setMatrixAt(fi++, dummy.matrix);
  }
  trunkInstanced.count = ti;
  trunkInstanced.instanceMatrix.needsUpdate = true;
  foliageInstanced.count = fi;
  foliageInstanced.instanceMatrix.needsUpdate = true;
}

const rockGeom = new THREE.DodecahedronGeometry(0.45, 0);
const rockMat = new THREE.MeshStandardMaterial({ color: '#6e685f', roughness: 0.7, flatShading: true });
const rockInstanced = new THREE.InstancedMesh(rockGeom, rockMat, 4000);
scene.add(rockInstanced);

const bushGeom = new THREE.SphereGeometry(0.55, 5, 4);
const bushMat = new THREE.MeshStandardMaterial({ color: '#3a4f30', roughness: 0.9, flatShading: true });
const bushInstanced = new THREE.InstancedMesh(bushGeom, bushMat, 3000);
scene.add(bushInstanced);

const groundData = [];
function addGround(x, z) {
  const h = sampleHeightJS(x, z);
  if (h < 3.8 || h > 27) return;
  if (Math.random() > 0.42) return;
  const s = 0.5 + Math.random() * 2.2;
  const rot = Math.random() * Math.PI * 2;
  groundData.push({ x, z, h, s, rot, rock: Math.random() > 0.4 });
}
function buildGround() {
  let ri = 0, bi = 0;
  const dm = dummy;
  for (const g of groundData) {
    dm.position.set(g.x, g.h + (g.rock ? 0.14 : 0.28), g.z);
    dm.scale.setScalar(g.s);
    dm.rotation.set(g.rock ? 0 : 1.3, g.rot, g.rock ? g.rot : 0);
    dm.updateMatrix();
    if (g.rock && ri < 8000) rockInstanced.setMatrixAt(ri++, dm.matrix);
    else if (!g.rock && bi < 6000) bushInstanced.setMatrixAt(bi++, dm.matrix);
  }
  rockInstanced.count = ri;
  rockInstanced.instanceMatrix.needsUpdate = true;
  bushInstanced.count = bi;
  bushInstanced.instanceMatrix.needsUpdate = true;
}

// populate chunks
const step = 5.5;
for (let x = -CHUNKS_RADIUS; x <= CHUNKS_RADIUS; x++) {
  for (let z = -CHUNKS_RADIUS; z <= CHUNKS_RADIUS; z++) {
    for (let lx = -CHUNK/2; lx < CHUNK/2; lx += step) {
      for (let lz = -CHUNK/2; lz < CHUNK/2; lz += step) {
        if (Math.random() > 0.68) continue;
        const wx = x * CHUNK + lx + (Math.random() - 0.5) * step;
        const wz = z * CHUNK + lz + (Math.random() - 0.5) * step;
        addTree(wx, wz);
        addGround(wx, wz);
      }
    }
  }
}
buildInstancedTrees();
buildGround();

// ============================================================
// WALK STATE
// ============================================================
const state = { speed: 4.2, distance: 0, yaw: 0, pitch: 0.42, bob: 0, sway: 0 };
let dragging = false;
let prevMouse = { x: 0, y: 0 };
canvas.addEventListener('pointerdown', (e) => { dragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; canvas.setPointerCapture(e.pointerId); });
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  state.yaw -= (e.clientX - prevMouse.x) * 0.004;
  state.pitch -= (e.clientY - prevMouse.y) * 0.004;
  state.pitch = Math.max(-0.35, Math.min(1.35, state.pitch));
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
});
window.addEventListener('wheel', (e) => {
  state.speed *= e.deltaY < 0 ? 1.08 : 0.92;
  state.speed = Math.max(1.0, Math.min(24, state.speed));
  paceEl.textContent = (state.speed / 4.2).toFixed(1) + 'x';
}, { passive: true });

// ============================================================
// LOOP
// ============================================================
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(clock.getDelta(), 0.1);
  const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, state.yaw, 0));
  camera.position.addScaledVector(forward, state.speed * dt);
  state.distance += state.speed * dt;

  const ground = sampleHeightJS(camera.position.x, camera.position.z);
  const targetY = ground + 3.3;
  camera.position.y += (targetY - camera.position.y) * Math.min(dt * 4.0, 1);
  state.bob += dt * state.speed * 1.6;
  const bobY = Math.sin(state.bob) * 0.26;
  const swayX = Math.cos(state.bob * 0.55) * 0.1;
  state.sway += (swayX - state.sway) * Math.min(dt * 8, 1);
  camera.position.y += bobY;
  camera.position.x += state.sway;

  camera.rotation.order = 'YXZ';
  camera.rotation.y = state.yaw;
  camera.rotation.x = state.pitch;

  water.position.x = camera.position.x;
  water.position.z = camera.position.z;

  const cx = Math.round(camera.position.x / CHUNK);
  const cz = Math.round(camera.position.z / CHUNK);
  const desired = new Set();
  for (let x = cx - CHUNKS_RADIUS; x <= cx + CHUNKS_RADIUS; x++)
    for (let z = cz - CHUNKS_RADIUS; z <= cz + CHUNKS_RADIUS; z++) {
      desired.add(chunkKey(x, z));
      ensureChunk(x, z);
    }
  for (const [key] of chunks) if (!desired.has(key)) removeChunk(...key.split(',').map(Number));

  distEl.textContent = (state.distance / 1000).toFixed(2);
  elevEl.textContent = Math.round(camera.position.y * 10) / 10;

  terrainMaterial.uniforms.uTime.value = clock.elapsedTime;
  waterMaterial.uniforms.uTime.value = clock.elapsedTime;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

loading.classList.add('hidden');
tick();
// safety: hide loading after 3s even if tick stalls
setTimeout(() => loading.classList.add('hidden'), 3000);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
