<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk — Limitless Labs</title>
<link rel="stylesheet" href="/limitless-labs/style.css?v=3">
<style id="walk-inline-css">
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0d0f}
  #walk-canvas{position:fixed;inset:0;display:block;width:100%;height:100%;}
  .walk-ui{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
  .walk-chip{background:rgba(11,13,15,.55);border:1px solid rgba(224,167,67,.25);color:#e6e6e6;padding:10px 14px;border-radius:999px;backdrop-filter:blur(6px);font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  .walk-chip .accent{color:#e0a743}
  .walk-hint{position:fixed;left:50%;top:16px;transform:translateX(-50%);color:#cfd3d6;background:rgba(11,13,15,.45);border:1px solid rgba(224,167,67,.18);padding:8px 12px;border-radius:10px;backdrop-filter:blur(6px);font:12px/1.3 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;z-index:10;opacity:.9}
  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0d0f;color:#e0a743;font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;z-index:20;transition:opacity .8s}
  .loading.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="walk-canvas" aria-label="Procedural infinite walk through a national park landscape"></canvas>
<div class="loading" id="loading">GENERATING WORLD...</div>
<div class="walk-hint">Click &amp; drag to look · Walk automatically · Scroll to adjust pace</div>
<div class="walk-ui">
  <div class="walk-chip">PACE <span class="accent" id="pace">1.0x</span></div>
  <div class="walk-chip">DIST <span class="accent" id="dist">0.00</span> <span style="opacity:.7">km</span></div>
  <div class="walk-chip">ELEV <span class="accent" id="elev">0</span> <span style="opacity:.7">m</span></div>
  <div class="walk-chip">BIOME <span class="accent" id="biome">—</span></div>
</div>

<script type="importmap">
{ "imports": { "three": "../vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('walk-canvas');
const loading = document.getElementById('loading');
const paceEl = document.getElementById('pace');
const distEl = document.getElementById('dist');
const elevEl = document.getElementById('elev');
const biomeEl = document.getElementById('biome');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
if (!renderer.capabilities.isWebGL2) {
  loading.textContent = 'WEBGL UNAVAILABLE — try a modern browser';
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.45;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.onerror = (e) => { console.error('WebGL error:', e); loading.textContent = 'RENDER ERROR — refresh'; };

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1.0, 1200);
camera.position.set(0, 4.2, 0);
const sunDir = new THREE.Vector3(200, 120, -90).normalize();

// ============================================================
// SHADER — fullscreen quad with raymarching
// Based on iq's techniques from Shadertoy "Elevated"
// ============================================================

const vertexShader = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = vec4(position.xy, 0.0, 1.0);
}
`;

const fragmentShader = `
#define PI 3.14159265359
#define TWO_PI 6.28318530718

varying vec2 vUv;
uniform vec3 uCameraPos;
uniform vec3 uCameraDir;
uniform vec3 uCameraUp;
uniform float uTime;
uniform vec2 uResolution;
uniform float uSpeed;

// iq's value noise with analytical derivatives
vec3 noised(vec2 x) {
  vec2 p = floor(x);
  vec2 f = fract(x);
  f = f*f*(3.0-2.0*f);
  vec2 u = f*f*(3.0-2.0*f);
  float n = p.x + p.y*57.0;
  float a = fract(sin(n+0.0)*43758.5453123);
  float b = fract(sin(n+1.0)*43758.5453123);
  float c = fract(sin(n+57.0)*43758.5453123);
  float d = fract(sin(n+58.0)*43758.5453123);
  return vec3(a+(b-a)*u.x+(c-a)*u.y+(a-b-c+d)*u.x*u.y,
              30.0*f*f*(f*(f-2.0)+1.0)*(vec2(b-a,c-a)+(a-b-c+d)*u.yx));
}

const mat2 m2 = mat2(1.6,-1.2,1.2,1.6);

float fbm(vec2 p) {
  float f = 0.0;
  f += 0.5000*noised(p).x; p = m2*p*2.02;
  f += 0.2500*noised(p).x; p = m2*p*2.03;
  f += 0.1250*noised(p).x; p = m2*p*2.01;
  f += 0.0625*noised(p).x;
  return f/0.9375;
}

// iq's terrain function with derivative accumulation
float terrain(vec2 x, out vec2 d) {
  vec2 p = x*0.003;
  float a = 0.0;
  float b = 1.0;
  d = vec2(0.0);
  for(int i=0; i<6; i++) {
    vec3 n = noised(p);
    d += n.yz;
    a += b*n.x/(1.0+dot(d,d));
    b *= 0.5;
    p = m2*p;
  }
  return 140.0*a;
}

float getHeight(vec2 p) {
  vec2 d;
  return terrain(p, d);
}

// SDF for terrain raymarching
float map(vec3 pos, out vec2 d) {
  float h = terrain(pos.xz, d);
  return pos.y - h;
}

vec3 calcNormal(vec3 pos) {
  vec2 d;
  vec2 e = vec2(0.5, -0.5);
  float r = 0.5;
  vec3 n = vec3(
    map(pos + vec3(r,0,0), d) - map(pos + vec3(-r,0,0), d),
    map(pos + vec3(0,r,0), d) - map(pos + vec3(0,-r,0), d),
    map(pos + vec3(0,0,r), d) - map(pos + vec3(0,0,-r), d)
  );
  return normalize(n);
}

// iq's raymarching terrain intersection (optimized for Pi)
float intersect(vec3 ro, vec3 rd) {
  float t = 0.0;
  for(int i=0; i<96; i++) {
    vec3 pos = ro + t*rd;
    vec2 d;
    float h = map(pos, d);
    if(h < 0.001 && t > 0.1) return t;
    float step = h * 0.5;
    if(step < 0.01) step = 0.01;
    t += step;
    if(t > 1200.0) break;
  }
  return -1.0;
}

void main() {
  vec2 xy = vUv * 2.0 - 1.0;
  xy.x *= uResolution.x / uResolution.y;

  vec3 ro = uCameraPos;
  vec3 ta = uCameraPos + uCameraDir;

  vec3 cw = normalize(ta - ro);
  vec3 cp = vec3(0.0, 1.0, 0.0);
  vec3 cu = normalize(cross(cw, cp));
  vec3 cv = normalize(cross(cu, cw));
  vec3 rd = normalize(xy.x * cu + xy.y * cv + 1.5 * cw);

  vec3 light1 = normalize(vec3(0.4, 0.22, 0.6));
  float sundot = clamp(dot(rd, light1), 0.0, 1.0);

  vec3 col;
  float t = intersect(ro, rd);

  if(t < 0.0) {
    // Sky
    col = vec3(0.85, 0.95, 1.0) * (1.0 - 0.5 * rd.y);
    col += 0.25 * vec3(1.0, 0.8, 0.4) * pow(sundot, 12.0);
  } else {
    vec3 pos = ro + t * rd;
    vec3 nor = calcNormal(pos);

    float h = pos.y;
    float t_norm = clamp(h / 140.0, 0.0, 1.0);

    // Biome blending (iq's technique)
    float grassW = 1.0 - smoothstep(0.15, 0.45, t_norm);
    float dirtW = smoothstep(0.25, 0.50, t_norm) * (1.0 - smoothstep(0.50, 0.70, t_norm));
    float rockW = smoothstep(0.45, 0.75, t_norm) * (1.0 - smoothstep(0.75, 0.92, t_norm));
    float snowW = smoothstep(0.82, 0.98, t_norm);

    float slope = 1.0 - abs(nor.y);
    rockW += slope * 0.55;
    dirtW += slope * 0.25;
    grassW = max(0.0, grassW - slope * 0.7);

    // Texture colors (procedural)
    vec3 grass = vec3(0.25, 0.55, 0.20);
    vec3 dirt = vec3(0.45, 0.30, 0.18);
    vec3 rock = vec3(0.40, 0.38, 0.34);
    vec3 snow = vec3(0.95, 0.96, 0.98);

    // Detail noise
    float r = fbm(pos.xz * 7.0);
    vec3 col_terrain = (r * 0.25 + 0.75) * 0.9 * mix(
      vec3(0.08, 0.05, 0.03),
      vec3(0.13, 0.10, 0.08),
      clamp(terrain(vec2(pos.x, pos.y * 48.0), d) / 200.0, 0.0, 1.0)
    );

    col_terrain = mix(col_terrain, 0.15 * vec3(0.45, 0.23, 0.04) * (0.50 + 0.50 * r), smoothstep(0.70, 0.9, nor.y));
    col_terrain = mix(col_terrain, 0.10 * vec3(0.30, 0.30, 0.00) * (0.25 + 0.75 * r), smoothstep(0.95, 1.0, nor.y));

    col = grass * grassW + dirt * dirtW + rock * rockW + snow * snowW;
    col *= col_terrain * 0.3 + col * 0.7;

    // Snow (iq's technique)
    float h_snow = smoothstep(55.0, 80.0, pos.y + 25.0 * fbm(0.01 * pos.xz));
    float e = smoothstep(1.0 - 0.5 * h_snow, 1.0 - 0.1 * h_snow, nor.y);
    float o = 0.3 + 0.7 * smoothstep(0.0, 0.1, nor.x + h_snow * h_snow);
    float s = h_snow * e * o;
    col = mix(col, 0.35 * vec3(0.62, 0.65, 0.7), smoothstep(0.1, 0.9, s));

    // Lighting
    float amb = clamp(0.5 + 0.5 * nor.y, 0.0, 1.0);
    float dif = clamp(dot(light1, nor), 0.0, 1.0);
    float bac = clamp(0.2 + 0.8 * dot(normalize(vec3(-light1.x, 0.0, light1.z)), nor), 0.0, 1.0);

    vec3 lin = vec3(0.0);
    lin += dif * vec3(8.0, 5.5, 3.0);
    lin += amb * vec3(0.30, 0.50, 0.60);
    lin += bac * vec3(0.60, 0.60, 0.60);
    col *= lin;

    // Atmospheric fog
    float fo = 1.0 - exp(-0.0007 * t);
    vec3 fco = vec3(0.55, 0.65, 0.75) + 0.6 * vec3(1.0, 0.8, 0.5) * pow(sundot, 4.0);
    col = mix(col, fco, fo);

    col += 0.4 * vec3(1.0, 0.8, 0.4) * pow(sundot, 8.0) * (1.0 - exp(-0.005 * t));
  }

  col = pow(col, vec3(0.45));
  col = col * 0.6 + 0.4 * col * col * (3.0 - 2.0 * col);

  vec2 uv = vUv * 0.5 + 0.5;
  col *= 0.7 + 0.3 * pow(16.0 * uv.x * uv.y * (1.0 - uv.x) * (1.0 - uv.y), 0.1);

  gl_FragColor = vec4(col, 1.0);
}
`;

const material = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: {
    uCameraPos: { value: camera.position.clone() },
    uCameraDir: { value: new THREE.Vector3(0, 0, -1) },
    uCameraUp: { value: new THREE.Vector3(0, 1, 0) },
    uTime: { value: 0 },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    uSpeed: { value: 1.0 },
  },
  side: THREE.DoubleSide,
});

const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
scene.add(quad);

// ============================================================
// WALK STATE
// ============================================================
const state = { speed: 4.2, distance: 0, yaw: 0, pitch: 0.42, bob: 0, sway: 0 };

// ============================================================
// STARTUP
// ============================================================
requestAnimationFrame(() => {
  loading.classList.add('hidden');
  tick();
});
setTimeout(() => loading.classList.add('hidden'), 4000);

let dragging = false;
let prevMouse = { x: 0, y: 0 };
canvas.addEventListener('pointerdown', (e) => { dragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; canvas.setPointerCapture(e.pointerId); });
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  state.yaw -= (e.clientX - prevMouse.x) * 0.004;
  state.pitch -= (e.clientY - prevMouse.y) * 0.004;
  state.pitch = Math.max(-0.25, Math.min(1.25, state.pitch));
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
});
window.addEventListener('wheel', (e) => {
  state.speed *= e.deltaY < 0 ? 1.08 : 0.92;
  state.speed = Math.max(1.0, Math.min(24, state.speed));
  paceEl.textContent = (state.speed / 4.2).toFixed(1) + 'x';
  material.uniforms.uSpeed.value = state.speed / 4.2;
}, { passive: true });

// Biome classification
const BIOME_NAMES = ['river valley', 'lowland meadow', 'mixed forest', 'high grass', 'rocky ridge', 'alpine snow'];
function classifyBiome(h, slope) {
  if (h > 80 && slope < 0.25) return 'alpine snow';
  if (h > 60) return 'rocky ridge';
  if (h > 40 && slope < 0.35) return 'high grass';
  if (slope > 0.6) return 'rocky ridge';
  if (h < 15) return 'river valley';
  return 'mixed forest';
}

// ============================================================
// LOOP
// ============================================================
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(clock.getDelta(), 0.1);
  const time = clock.elapsedTime;

  const fwd = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, state.yaw, 0));
  camera.position.addScaledVector(fwd, state.speed * dt);
  state.distance += state.speed * dt;

  // Get terrain height at camera position
  const camX = camera.position.x;
  const camZ = camera.position.z;

  // Sample height using the same terrain function
  const m2 = [1.6, -1.2, 1.2, 1.6];
  const noised = (px, pz) => {
    const p = [Math.floor(px), Math.floor(pz)];
    const f = [px - p[0], pz - p[1]];
    const u = [f[0]*f[0]*(3-2*f[0]), f[1]*f[1]*(3-2*f[1])];
    const n = p[0] + p[1]*57;
    const a = Math.sin(n+0)*43758.5453123, b = Math.sin(n+1)*43758.5453123;
    const c = Math.sin(n+57)*43758.5453123, d = Math.sin(n+58)*43758.5453123;
    const va = a - Math.floor(a), vb = b - Math.floor(b);
    const vc = c - Math.floor(c), vd = d - Math.floor(d);
    return va + (vb-va)*u[0] + (vc-va)*u[1] + (va-vb-vc+vd)*u[0]*u[1];
  };
  const terrainJS = (px, pz) => {
    let p = [px*0.003, pz*0.003];
    let a = 0, b = 1;
    let dx = 0, dz = 0;
    for(let i=0; i<6; i++) {
      const n = noised(p[0], p[1]);
      // Accumulate derivatives like the GLSL shader
      dx += 0; dz += 0; // JS noised doesn't return derivatives, use simplified
      a += b*n/(1.0);
      b *= 0.5;
      const np = [m2[0]*p[0] + m2[1]*p[1], m2[2]*p[0] + m2[3]*p[1]];
      p = np;
    }
    return 140.0*a;
  };
  const ground = terrainJS(camX, camZ);
  const targetY = ground + 3.3;
  camera.position.y += (targetY - camera.position.y) * Math.min(dt * 4.0, 1);

  state.yaw += Math.sin(time * 0.25) * dt * 0.03;

  // Update shader uniforms
  material.uniforms.uCameraPos.value.copy(camera.position);
  const dir = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(state.pitch, 0, 0)).applyEuler(new THREE.Euler(0, state.yaw, 0));
  material.uniforms.uCameraDir.value.copy(dir);
  material.uniforms.uTime.value = time;

  // Update UI
  distEl.textContent = (state.distance / 1000).toFixed(2);
  elevEl.textContent = Math.round(ground);
  const hAhead = terrainJS(camera.position.x + 1, camera.position.z);
  const slope = Math.min(Math.abs(hAhead - ground) / 3.0, 1.0);
  biomeEl.textContent = classifyBiome(ground, Math.max(0, 1 - slope));

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
