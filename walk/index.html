<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk — Limitless Labs</title>
<link rel="stylesheet" href="/limitless-labs/style.css?v=3">
<style id="walk-inline-css">
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0d0f}
  #walk-canvas{position:fixed;inset:0;display:block;width:100%;height:100%}
  .walk-ui{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
  .walk-chip{background:rgba(11,13,15,.55);border:1px solid rgba(224,167,67,.25);color:#e6e6e6;padding:10px 14px;border-radius:999px;backdrop-filter:blur(6px);font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  .walk-chip .accent{color:#e0a743}
  .walk-hint{position:fixed;left:50%;top:16px;transform:translateX(-50%);color:#cfd3d6;background:rgba(11,13,15,.45);border:1px solid rgba(224,167,67,.18);padding:8px 12px;border-radius:10px;backdrop-filter:blur(6px);font:12px/1.3 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;z-index:10;opacity:.9}
  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0d0f;color:#e0a743;font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;z-index:20;transition:opacity .8s}
  .loading.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="walk-canvas" aria-label="Procedural infinite walk through a national park landscape"></canvas>
<div class="loading" id="loading">GENERATING WORLD...</div>
<div class="walk-hint">Click &amp; drag to look · Walk automatically · Scroll to adjust pace</div>
<div class="walk-ui">
  <div class="walk-chip">PACE <span class="accent" id="pace">1.0x</span></div>
  <div class="walk-chip">DIST <span class="accent" id="dist">0.00</span> <span style="opacity:.7">km</span></div>
  <div class="walk-chip">ELEV <span class="accent" id="elev">0</span> <span style="opacity:.7">m</span></div>
  <div class="walk-chip">BIOME <span class="accent" id="biome">—</span></div>
</div>

<script type="importmap">
{ "imports": { "three": "../vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('walk-canvas');
const loading = document.getElementById('loading');
const paceEl = document.getElementById('pace');
const distEl = document.getElementById('dist');
const elevEl = document.getElementById('elev');
const biomeEl = document.getElementById('biome');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
if (!renderer.capabilities.isWebGL2) {
  loading.textContent = 'WEBGL UNAVAILABLE — try a modern browser';
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.45;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.onerror = (e) => { console.error('WebGL error:', e); loading.textContent = 'RENDER ERROR — refresh'; };

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1.0, 1200);
camera.position.set(0, 4.2, 0);
const sunDir = new THREE.Vector3(200, 120, -90).normalize();
const ambientLight = new THREE.AmbientLight('#b8c8d8', 0.9);
const sunLight = new THREE.DirectionalLight('#fff4e0', 2.4);
sunLight.position.copy(sunDir).multiplyScalar(120);
scene.add(ambientLight, sunLight);

// ============================================================
// SKY — atmospheric Rayleigh/Mie approximation
// ============================================================
const skyVertexShader = `
varying vec3 vWorldPos;
void main() {
  vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;
const skyFragmentShader = `
varying vec3 vWorldPos;
uniform vec3 uSunDir;
uniform float uTime;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 6; i++) { v += a * noise(p); p *= 2.05; a *= 0.48; }
  return v;
}
void main() {
  vec3 dir = normalize(vWorldPos);
  float y = dir.y * 0.5 + 0.5;

  // sun disk + low-atmosphere haze
  float sun = max(dot(dir, normalize(uSunDir)), 0.0);
  vec3 haze = vec3(0.72, 0.76, 0.82);
  vec3 horizon = mix(vec3(0.72, 0.76, 0.83), vec3(0.88, 0.84, 0.78), pow(sun, 4.0));
  vec3 zenith = vec3(0.18, 0.34, 0.62);
  vec3 nadir = vec3(0.52, 0.48, 0.44);
  vec3 col = mix(nadir, mix(horizon, zenith, pow(y, 0.55)), step(0.0, dir.y));

  // soft sky blob near horizon + sun
  col += vec3(0.95, 0.88, 0.72) * pow(sun, 8.0) * 0.18;
  col += vec3(1.0, 0.96, 0.82) * pow(sun, 32.0) * 0.45;
  col += vec3(1.0, 0.94, 0.78) * pow(sun, 160.0) * 0.9;

  // haze under sun
  float hDir = max(dot(normalize(vec3(dir.x, 0.0, dir.z)), normalize(vec3(uSunDir.x, 0.0, uSunDir.z))), 0.0);
  col = mix(col, haze, pow(hDir, 6.0) * 0.35 * smoothstep(0.35, 0.75, y));

  // clouds layers
  vec3 sunH = normalize(vec3(uSunDir.x, max(uSunDir.y, 0.05), uSunDir.z));
  float cloudA = fbm(dir.xz / (dir.y + 0.45) * 1.35 + uTime * 0.004);
  cloudA = smoothstep(0.48, 0.72, cloudA);
  float cloudB = fbm(dir.xz / (dir.y + 0.35) * 1.8 - uTime * 0.003 + 3.7);
  cloudB = smoothstep(0.52, 0.78, cloudB);
  float cloudMask = (cloudA * 0.7 + cloudB * 0.3);
  // backscatter around sun
  float sunBack = pow(max(dot(dir, sunH), 0.0), 2.0);
  cloudMask += sunBack * 0.2;
  vec3 cloudCol = mix(haze, vec3(1.0, 0.95, 0.9), pow(sunBack, 2.0));
  col = mix(col, cloudCol, cloudMask * 0.85);

  // darker at very low angles for depth
  col *= 1.0 - (1.0 - y) * 0.45;

  gl_FragColor = vec4(col, 1.0);
}
`;

// ============================================================
// ROAD SYSTEM — spline-based procedural road
// ============================================================
const ROAD_SPLINE_POINTS = 220;
const ROAD_SPLINE_STEP = 80;
const ROAD_WIDTH = 6.5;
const ROAD_SEGMENTS = 48;
const ROAD_VERTEX_COUNT = ROAD_SPLINE_POINTS * ROAD_SEGMENTS * 4;

function generateRoadSpline() {
  const points = []; const tangents = []; const upVectors = [];
  let pos = new THREE.Vector3(0, 0, 0);
  let forward = new THREE.Vector3(0, 0, -1);
  let up = new THREE.Vector3(0, 1, 0);
  let right = new THREE.Vector3(1, 0, 0);

  function roadNoise(x, z, scale) {
    let v = 0, a = 1;
    const p = new THREE.Vector2(x ?? 0, z ?? 0).multiplyScalar(scale);
    for (let i = 0; i < 5; i++) {
      const np = p.clone().multiplyScalar(a);
      const h = Math.sin(np.x * 12.9898 + np.y * 78.233) * 43758.5453;
      v += a * (h - Math.floor(h));
      a *= 0.5;
    }
    return v;
  }

  for (let i = 0; i < ROAD_SPLINE_POINTS; i++) {
    const baseDist = i * ROAD_SPLINE_STEP;
    const curveAmount = roadNoise(baseDist * 0.001, 0, 1.0) * 2.0 - 1.0;
    const curvature = curveAmount * 0.00065;
    const bankAngle = curvature * 140.0;
    const elevationNoise = roadNoise(baseDist * 0.0005, 1000, 1.0);
    const elevation = elevationNoise * 22.0;

    const turnQuat = new THREE.Quaternion().setFromAxisAngle(up, curvature * ROAD_SPLINE_STEP);
    forward.applyQuaternion(turnQuat).normalize();
    right.crossVectors(up, forward).normalize();
    const bankQuat = new THREE.Quaternion().setFromAxisAngle(forward, bankAngle);
    const tiltedUp = up.clone().applyQuaternion(bankQuat).normalize();
    pos.addScaledVector(forward, ROAD_SPLINE_STEP);
    pos.y = elevation;

    points.push(pos.clone());
    tangents.push(forward.clone());
    upVectors.push(tiltedUp.clone());
  }
  return { points, tangents, upVectors };
}

function buildRoadMesh(spline) {
  const positions = new Float32Array(ROAD_VERTEX_COUNT * 3);
  const uvs = new Float32Array(ROAD_VERTEX_COUNT * 2);
  const normals = new Float32Array(ROAD_VERTEX_COUNT * 3);
  const roadIds = new Float32Array(ROAD_VERTEX_COUNT);
  let idx = 0;

  for (let seg = 0; seg < ROAD_SPLINE_POINTS - 1; seg++) {
    const p0 = spline.points[seg]; const p1 = spline.points[seg + 1];
    const t0 = spline.tangents[seg]; const t1 = spline.tangents[seg + 1];
    const u0 = spline.upVectors[seg]; const u1 = spline.upVectors[seg + 1];
    const r0 = new THREE.Vector3().crossVectors(u0, t0).normalize();
    const r1 = new THREE.Vector3().crossVectors(u1, t1).normalize();

    for (let s = 0; s <= ROAD_SEGMENTS; s++) {
      const u = s / ROAD_SEGMENTS; const invU = 1 - u;
      const pos = new THREE.Vector3().copy(p0).multiplyScalar(invU).addScaledVector(p1, u);
      const tangent = new THREE.Vector3().copy(t0).multiplyScalar(invU).addScaledVector(t1, u).normalize();
      const up = new THREE.Vector3().copy(u0).multiplyScalar(invU).addScaledVector(u1, u).normalize();
      const right = new THREE.Vector3().crossVectors(up, tangent).normalize();

      const crown = (r) => r === 1 ? 0.04 * (1 - Math.abs((r - 0.5) * 2)) : 0;
      const profile = [
        { offset: -ROAD_WIDTH * 0.72, id: 0 },
        { offset: -ROAD_WIDTH * 0.38, id: 1 },
        { offset:  ROAD_WIDTH * 0.38, id: 1 },
        { offset:  ROAD_WIDTH * 0.72, id: 0 }
      ];
      for (let pi = 0; pi < profile.length; pi++) {
        const prof = profile[pi];
        const vertex = pos.clone().addScaledVector(right, prof.offset);
        vertex.y += crown(prof.id);

        positions[idx * 3] = vertex.x;
        positions[idx * 3 + 1] = vertex.y;
        positions[idx * 3 + 2] = vertex.z;
        uvs[idx * 2] = (seg + u) / (ROAD_SPLINE_POINTS - 1);
        uvs[idx * 2 + 1] = pi / (profile.length - 1);
        roadIds[idx] = prof.id;
        const nrm = up;
        normals[idx * 3] = nrm.x; normals[idx * 3 + 1] = nrm.y; normals[idx * 3 + 2] = nrm.z;
        idx++;
      }
    }
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geom.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  geom.setAttribute('roadId', new THREE.BufferAttribute(roadIds, 1));
  geom.computeBoundingSphere();
  return geom;
}

const roadVertexShader = `
varying vec2 vUv;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vRoadId;
void main() {
  vUv = uv;
  vRoadId = roadId;
  vNormal = normalize(normalMatrix * normal);
  vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;
const roadFragmentShader = `
varying vec2 vUv;
varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vRoadId;
uniform vec3 uSunDir;
uniform float uTime;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.15; a *= 0.5; }
  return v;
}
void main() {
  float alongRoad = vUv.x;
  float acrossRoad = vUv.y;
  vec3 asphalt = vec3(0.12, 0.11, 0.10);
  vec3 shoulder = vec3(0.22, 0.20, 0.17);
  vec3 lineWhite = vec3(0.94, 0.94, 0.90);
  vec3 lineYellow = vec3(1.0, 0.85, 0.15);
  vec3 col = shoulder;
  if (vRoadId > 0.5 && vRoadId < 1.5) {
    float n = fbm(vWorldPos.xz * 0.35) * 0.18;
    col = asphalt * (0.9 + n);
    float centerDist = abs(acrossRoad - 0.5);
    float dash = fract(alongRoad * 0.9 + uTime * 0.02);
    if (centerDist < 0.018 && dash < 0.55) { col = mix(col, lineYellow, 0.95); }
    float edgeDist = min(abs(acrossRoad - 0.28), abs(acrossRoad - 0.72));
    if (edgeDist < 0.014) { col = mix(col, lineWhite, 0.85); }
    float wear = smoothstep(0.36, 0.45, acrossRoad) * smoothstep(0.55, 0.64, acrossRoad);
    col *= 1.0 - wear * 0.18;
  } else {
    float n = fbm(vWorldPos.xz * 0.14 + uTime * 0.01) * 0.3;
    col = shoulder * (0.82 + n);
    float edgeLine = smoothstep(0.08, 0.12, acrossRoad) + smoothstep(0.88, 0.92, acrossRoad);
    col = mix(col, lineWhite * 0.7, edgeLine * 0.35);
  }
  vec3 N = normalize(vNormal);
  float NdotL = max(dot(N, normalize(uSunDir)), 0.0);
  float wrap = max(dot(N, normalize(uSunDir + vec3(0.0, 0.3, 0.0))), 0.0);
  vec3 ambient = vec3(0.22, 0.25, 0.30);
  vec3 diffuse = vec3(1.0, 0.98, 0.90) * (wrap * 0.65 + 0.35);
  col *= ambient + diffuse * NdotL * 0.85;
  float fresnel = pow(1.0 - max(dot(N, normalize(-vWorldPos)), 0.0), 3.0);
  col += vec3(0.08, 0.10, 0.13) * fresnel * 0.35;
  gl_FragColor = vec4(col, 1.0);
}
`;

let roadSpline = null;
let roadMesh = null;
const roadSplineObjects = [];

function initRoad() {
  roadSpline = generateRoadSpline();
  const geom = buildRoadMesh(roadSpline);
  const roadMaterial = new THREE.ShaderMaterial({
    vertexShader: roadVertexShader,
    fragmentShader: roadFragmentShader,
    uniforms: {
      uSunDir: { value: sunDir.clone() },
      uTime: { value: 0 }
    }
  });
  roadMesh = new THREE.Mesh(geom, roadMaterial);
  roadMesh.frustumCulled = false;
  scene.add(roadMesh);

  // Guardrail posts along road edges
  const railGeo = new THREE.CylinderGeometry(0.06, 0.08, 1.1, 5);
  const railMat = new THREE.MeshStandardMaterial({ color: '#3a3a3a', roughness: 0.7, metalness: 0.4 });
  const railMax = 6000;
  const railInst = new THREE.InstancedMesh(railGeo, railMat, railMax);
  const dm = new THREE.Object3D();
  let ri = 0;
  for (let seg = 0; seg < ROAD_SPLINE_POINTS - 1 && ri < railMax; seg += 2) {
    const p = roadSpline.points[seg];
    const n = roadSpline.tangents[seg];
    const u = roadSpline.upVectors[seg];
    const r = new THREE.Vector3().crossVectors(u, n).normalize();
    [r.clone().multiplyScalar(-ROAD_WIDTH * 0.72), r.clone().multiplyScalar(ROAD_WIDTH * 0.72)].forEach((side) => {
      if (ri >= railMax) return;
      dm.position.copy(p).add(side);
      dm.rotation.y = Math.atan2(n.x, n.z);
      dm.updateMatrix();
      railInst.setMatrixAt(ri++, dm.matrix);
    });
  }
  railInst.count = ri;
  railInst.instanceMatrix.needsUpdate = true;
  scene.add(railInst);
  roadSplineObjects.push(railInst);
}

function getRoadInfoAt(worldX, worldZ) {
  if (!roadSpline) return null;
  let bestIdx = 0;
  let bestDist = Infinity;
  for (let i = 0; i < roadSpline.points.length; i++) {
    const p = roadSpline.points[i];
    const d = (p.x - worldX) ** 2 + (p.z - worldZ) ** 2;
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  const i0 = bestIdx;
  const i1 = Math.min(i0 + 1, roadSpline.points.length - 1);
  const p0 = roadSpline.points[i0]; const p1 = roadSpline.points[i1];
  const t0 = roadSpline.tangents[i0]; const t1 = roadSpline.tangents[i1];
  const u0 = roadSpline.upVectors[i0]; const u1 = roadSpline.upVectors[i1];
  const localDist = Math.sqrt(bestDist);
  const u = Math.min(localDist / Math.max(ROAD_SPLINE_STEP, 1e-6), 1.0);
  const invU = 1 - u;
  const pos = new THREE.Vector3().copy(p0).multiplyScalar(invU).addScaledVector(p1, u);
  const tangent = new THREE.Vector3().copy(t0).multiplyScalar(invU).addScaledVector(t1, u).normalize();
  const up = new THREE.Vector3().copy(u0).multiplyScalar(invU).addScaledVector(u1, u).normalize();
  const right = new THREE.Vector3().crossVectors(up, tangent).normalize();
  return { pos, tangent, up, right, index: bestIdx + u, dist: Math.sqrt(bestDist) };
}

// ============================================================
// TERRAIN
// ============================================================
const terrainVertexShader = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vHeight;
varying vec2 vUv;
varying float vSlope;
uniform float uTime;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 6; i++) { v += a * noise(p); p *= 2.08; a *= 0.48; }
  return v;
}
float getHeight(vec2 p) {
  float h = 0.0;
  h += fbm(p * 0.007) * 30.0;
  h += fbm(p * 0.028 + 5.3) * 9.0;
  float ridge = 1.0 - abs(fbm(p * 0.011 + 1.7) * 2.0 - 1.0);
  h += ridge * 16.0;
  float valley = abs(noise(p * 0.003 + 99.0) * 2.0 - 1.0);
  h -= pow(valley, 4.0) * 18.0;
  return h;
}
void main() {
  vUv = uv;
  vec3 pos = position;
  float h = getHeight(pos.xz);
  pos.y += h;
  vHeight = h;
  vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
  float eps = 0.5;
  float hL = getHeight(pos.xz + vec2(-eps, 0.0));
  float hR = getHeight(pos.xz + vec2( eps, 0.0));
  float hD = getHeight(pos.xz + vec2(0.0, -eps));
  float hU = getHeight(pos.xz + vec2(0.0,  eps));
  vec3 normal = normalize(vec3(hL - hR, 2.0 * eps, hD - hU));
  vNormal = normalize(normalMatrix * normal);
  vSlope = 1.0 - abs(normal.y);
  pos.y += fbm(pos.xz * 0.12) * 0.35;
  pos.y += noise(pos.xz * 0.6) * 0.08;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}
`;
const terrainFragmentShader = `
varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vHeight;
varying vec2 vUv;
varying float vSlope;
uniform sampler2D uGrassTex;
uniform sampler2D uRockTex;
uniform sampler2D uDirtTex;
uniform sampler2D uSnowTex;
uniform vec3 uSunDir;
uniform float uTime;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.15; a *= 0.5; }
  return v;
}
float vegetationNoise(vec2 p) {
  return fbm(p * 0.025) * 0.5 + fbm(p * 0.1) * 0.3 + fbm(p * 0.4) * 0.2;
}
void main() {
  vec3 N = normalize(vNormal);
  float h = vHeight;
  float t = clamp((h - 1.0) / 48.0, 0.0, 1.0);
  float grassW = 1.0 - smoothstep(0.20, 0.55, t);
  float dirtW = smoothstep(0.28, 0.55, t) * (1.0 - smoothstep(0.55, 0.72, t));
  float rockW = smoothstep(0.48, 0.72, t) * (1.0 - smoothstep(0.72, 0.88, t));
  float snowW = smoothstep(0.80, 0.98, t);
  float slope = vSlope;
  rockW += slope * 0.55; dirtW += slope * 0.25; grassW = max(0.0, grassW - slope * 0.7);

  vec2 uv1 = vWorldPos.xz * 0.12; vec2 uv2 = vWorldPos.xz * 0.06;
  float detail = fbm(uv2 * 3.0 + uTime * 0.008) * 0.5;
  vec3 grass = texture2D(uGrassTex, uv1 + detail * 0.05).rgb;
  vec3 dirt  = texture2D(uDirtTex, uv1 * 1.1 + detail * 0.04).rgb;
  vec3 rock  = texture2D(uRockTex, uv1 * 0.9 + detail * 0.06).rgb;
  vec3 snow  = texture2D(uSnowTex, uv1 * 1.2 + detail * 0.03).rgb;

  // multi-octave detail for surface richness (stochastic-style)
  vec2 dudv = vWorldPos.xz * 0.5;
  float micro = fbm(dudv * 4.0) * 0.12;
  float macro = fbm(dudv * 0.8 + 1.7) * 0.08;
  vec3 col = grass * grassW + dirt * dirtW + rock * rockW + snow * snowW;
  col += (micro + macro) * 0.15;
  // color variation per biome
  col *= 1.0 + vec3(0.03, 0.05, 0.01) * sin(vWorldPos.x * 0.3 + vWorldPos.z * 0.2);

  // vegetation "green boost" from procedural mask
  float veg = vegetationNoise(vWorldPos.xz);
  float grassPatch = smoothstep(0.38, 0.55, veg);
  col = mix(col, grass * 1.08, grassPatch * grassW * 0.45);

  col *= 1.0 - slope * 0.28;
  float shadow = fbm(vWorldPos.xz * 0.22) * 0.12;
  col *= 1.0 - shadow;

  // distance fog/atmospheric perspective (matches sky horizon color)
  float dist = length(vWorldPos - cameraPosition);
  float fog = 1.0 - exp(-dist * 0.00025);
  vec3 fogCol = mix(vec3(0.72, 0.76, 0.82), vec3(0.92, 0.88, 0.82), pow(max(dot(normalize(vWorldPos - cameraPosition), normalize(uSunDir)), 0.0), 2.5));
  col = mix(col, fogCol, fog * 0.65);

  float NdotL = max(dot(N, normalize(uSunDir)), 0.0);
  float wrap = max(dot(N, normalize(uSunDir + vec3(0.0, 0.3, 0.0))), 0.0);
  vec3 ambient = vec3(0.18, 0.22, 0.28);
  vec3 diffuse = vec3(1.0, 0.98, 0.88) * (wrap * 0.75 + 0.25);
  col *= ambient + diffuse * NdotL;
  gl_FragColor = vec4(col, 1.0);
}
`;

// ============================================================
// WATER
// ============================================================
const waterVertexShader = `
varying vec2 vUv;
varying vec3 vWorldPos;
uniform float uTime;
void main() {
  vUv = uv;
  vec3 pos = position;
  pos.y += sin(pos.x * 0.3 + uTime * 0.55) * 0.14;
  pos.y += cos(pos.z * 0.24 + uTime * 0.45) * 0.14;
  vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}
`;
const waterFragmentShader = `
varying vec2 vUv;
varying vec3 vWorldPos;
uniform float uTime;
uniform vec3 uSunDir;
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p); f = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
void main() {
  vec3 deep = vec3(0.10, 0.22, 0.33);
  vec3 shallow = vec3(0.22, 0.42, 0.54);
  float n = noise(vWorldPos.xz * 0.072 + uTime * 0.12) * 0.5 + 0.5;
  vec3 col = mix(deep, shallow, n);
  float fresnel = pow(1.0 - abs(dot(vec3(0.0, 1.0, 0.0), normalize(vec3(0.0, 1.0, 0.0)))), 2.0);
  float spec = pow(max(dot(normalize(vec3(0.0, 1.0, 0.0)), normalize(uSunDir)), 0.0), 48.0);
  col += vec3(0.6, 0.7, 0.8) * fresnel * 0.28;
  col += vec3(1.0, 1.0, 1.0) * spec * 0.25;
  gl_FragColor = vec4(col, 0.76);
}
`;

// ============================================================
// TEXTURES — procedural
// ============================================================
function valueNoise(x, y, octaves) {
  let v = 0, a = 1, f = 1;
  const hash = (n) => { let s = Math.sin(n) * 43758.5453; return s - Math.floor(s); };
  const smooth = (t) => t*t*t*(t*(t*6-15)+10);
  for (let i = 0; i < octaves; i++) {
    const ix = Math.floor(x*f), iz = Math.floor(y*f);
    const fx = smooth(x*f - ix), fz = smooth(y*f - iz);
    const v1 = hash(ix + iz*7919);
    const v2 = hash(ix+1 + iz*7919);
    const v3 = hash(ix + (iz+1)*7919);
    const v4 = hash(ix+1 + (iz+1)*7919);
    v += a * (v1*(1-fx)*(1-fz) + v2*fx*(1-fz) + v3*(1-fx)*fz + v4*fx*fz);
    a *= 0.5; f *= 2.0;
  }
  return v;
}
function makeTexture(size, fn) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(size, size);
  const d = img.data;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const i = (y * size + x) * 4;
      const [r, g, b, a] = fn(x / size, y / size);
      d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = a;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.generateMipmaps = true;
  tex.needsUpdate = true;
  return tex;
}
const grassTex = makeTexture(256, (u, v) => {
  const n1 = valueNoise(u*37.3, v*11.7, 3);
  const n2 = valueNoise(u*13.1, v*29.9, 2);
  const n3 = valueNoise(u*7.7, v*53.3, 1);
  const n = n1*0.15 + n2*0.1 + n3*0.08 + 0.65;
  return [n*120+80, n*180+100, n*90+60, 255];
});
const dirtTex = makeTexture(256, (u, v) => {
  const n1 = valueNoise(u*23.7, v*41.1, 3);
  const n2 = valueNoise(u*57.3, v*19.3, 2);
  const n3 = valueNoise(u*31.1, v*7.9, 1);
  const n = n1*0.2 + n2*0.15 + n3*0.1 + 0.55;
  return [n*140+80, n*100+60, n*70+40, 255];
});
const rockTex = makeTexture(256, (u, v) => {
  const n1 = valueNoise(u*53.1, v*31.7, 3);
  const n2 = valueNoise(u*17.9, v*47.3, 2);
  const n3 = valueNoise(u*11.3, v*61.7, 1);
  const n = n1*0.25 + n2*0.2 + n3*0.1 + 0.45;
  return [n*130+80, n*120+70, n*110+60, 255];
});
const snowTex = makeTexture(256, (u, v) => {
  const n1 = valueNoise(u*31.3, v*23.1, 2);
  const n2 = valueNoise(u*19.7, v*41.9, 1);
  const n = n1*0.08 + n2*0.04 + 0.88;
  return [n*255, n*252, n*255, 255];
});

const terrainMaterial = new THREE.ShaderMaterial({
  vertexShader: terrainVertexShader,
  fragmentShader: terrainFragmentShader,
  uniforms: {
    uTime: { value: 0 },
    uSunDir: { value: sunDir.clone() },
    uGrassTex: { value: grassTex },
    uDirtTex: { value: dirtTex },
    uRockTex: { value: rockTex },
    uSnowTex: { value: snowTex },
  },
});
const waterMaterial = new THREE.ShaderMaterial({
  vertexShader: waterVertexShader,
  fragmentShader: waterFragmentShader,
  uniforms: { uTime: { value: 0 }, uSunDir: { value: sunDir.clone() } },
  transparent: true,
});
const skyMaterial = new THREE.ShaderMaterial({
  vertexShader: skyVertexShader,
  fragmentShader: skyFragmentShader,
  uniforms: { uSunDir: { value: sunDir.clone() }, uTime: { value: 0 } },
  side: THREE.BackSide,
});

const skyGeo = new THREE.SphereGeometry(450, 32, 32);
const skyMesh = new THREE.Mesh(skyGeo, skyMaterial);
scene.add(skyMesh);

// terrain chunks
const CHUNK = 96; const SEG = 64; const chunks = new Map();
function chunkKey(cx, cz) { return `${cx},${cz}`; }
function ensureChunk(cx, cz) {
  const key = chunkKey(cx, cz);
  if (chunks.has(key)) return;
  let mesh = chunkPool.pop();
  if (mesh) {
    mesh.position.set(cx * CHUNK, 0, cz * CHUNK);
  } else {
    const geom = new THREE.PlaneGeometry(CHUNK, CHUNK, SEG, SEG);
    geom.rotateX(-Math.PI / 2);
    mesh = new THREE.Mesh(geom, terrainMaterial);
    mesh.position.set(cx * CHUNK, 0, cz * CHUNK);
  }
  scene.add(mesh);
  chunks.set(key, mesh);
}
function removeChunk(cx, cz) {
  const key = chunkKey(cx, cz);
  const mesh = chunks.get(key);
  if (!mesh) return;
  scene.remove(mesh);
  chunkPool.push(mesh);
  chunks.delete(key);
}
const CHUNKS_RADIUS = 1;
const chunkPool = [];
const desiredSet = new Set();
for (let x = -CHUNKS_RADIUS; x <= CHUNKS_RADIUS; x++)
  for (let z = -CHUNKS_RADIUS; z <= CHUNKS_RADIUS; z++) ensureChunk(x, z);

const waterGeo = new THREE.PlaneGeometry(CHUNK * 6, CHUNK * 6);
waterGeo.rotateX(-Math.PI / 2);
const water = new THREE.Mesh(waterGeo, waterMaterial);
water.position.y = 2.8;
scene.add(water);

// ============================================================
// VEGETATION — sprite billboard (performance-friendly)
// ============================================================
function makeTreeSprite() {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(size, size);
  const d = img.data;
  // Pre-generate a few noise offsets for variety
  const noiseSeed = Math.random() * 100;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const i = (y * size + x) * 4;
      const u = x / size, v = y / size;
      // trunk: irregular vertical strip
      const trunkW = 0.06 + valueNoise(u*2+noiseSeed, v*2+noiseSeed, 1) * 0.03;
      const inTrunk = (u > 0.5 - trunkW && u < 0.5 + trunkW && v > 0.58 && v < 0.93);
      // canopy: layered irregular shape (3 overlapping circles)
      const dx = u - 0.5, dy = v - 0.42;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // irregular canopy boundary using noise
      const boundaryNoise = valueNoise(u*6+noiseSeed, v*6+noiseSeed, 2) * 0.12;
      const canopyRadius = 0.34 + boundaryNoise;
      const inCanopy = dist < canopyRadius;
      // shadow under tree
      const shadowDx = u - 0.5, shadowDy = v - 0.55;
      const shadowDist = Math.sqrt(shadowDx*shadowDx + shadowDy*shadowDy);
      const inShadow = shadowDist < 0.38 && v > 0.55 && v < 0.85;
      if (inTrunk) {
        const n = valueNoise(u*10+noiseSeed, v*10+noiseSeed, 1);
        const shade = 0.6 + n * 0.4;
        d[i] = Math.floor(70 * shade); d[i+1] = Math.floor(45 * shade); d[i+2] = Math.floor(30 * shade); d[i+3] = 255;
      } else if (inCanopy) {
        // layered green with noise variation
        const n = valueNoise(u*12+noiseSeed, v*12+noiseSeed, 2);
        const n2 = valueNoise(u*25+noiseSeed, v*25+noiseSeed, 1);
        const shade = 0.65 + n * 0.35;
        const detail = n2 * 0.15;
        // darker at top, lighter at bottom (sunlit bottom)
        const verticalGrad = 1.0 - (v - 0.1) * 0.3;
        d[i] = Math.floor((35 + detail*20) * shade * verticalGrad);
        d[i+1] = Math.floor((80 + detail*30) * shade * verticalGrad);
        d[i+2] = Math.floor((35 + detail*15) * shade * verticalGrad);
        d[i+3] = 255;
      } else if (inShadow) {
        d[i] = 20; d[i+1] = 15; d[i+2] = 10; d[i+3] = 80;
      } else {
        d[i] = 0; d[i+1] = 0; d[i+2] = 0; d[i+3] = 0;
      }
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  return tex;
}
// Generate multiple tree sprite variants for variety
const treeSpriteVariants = [
  makeTreeSprite(),
  makeTreeSprite(),
  makeTreeSprite(),
];
const treeSpriteMats = treeSpriteVariants.map(tex =>
  new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false })
);
const treeSprites = [];
const MAX_SPRITES = 2000;
const spritePool = [];
function sampleHeightJS(x, z) {
  let h = 0;
  const hash = (a, b) => { let n = Math.sin(a * 12.9898 + b * 78.233) * 43758.5453; return n - Math.floor(n); };
  const smooth = t => t*t*t*(t*(t*6-15)+10);
  const lerp = (a, b, t) => a + (b - a) * t;
  const noise = (x, z) => {
    const ix = Math.floor(x), iz = Math.floor(z);
    const fx = smooth(x - ix), fz = smooth(z - iz);
    return lerp(lerp(hash(ix, iz), hash(ix+1, iz), fx), lerp(hash(ix, iz+1), hash(ix+1, iz+1), fx), fz);
  };
  const fbm = (x, z, oct = 4) => { let v = 0, a = 0.5, f = 1; for (let i = 0; i < oct; i++) { v += a * noise(x*f, z*f); a *= 0.5; f *= 2.15; } return v; };
  h += fbm(x * 0.0075, z * 0.0075, 4) * 30;
  h += fbm(x * 0.032 + 5.3, z * 0.032 + 9.1, 3) * 9;
  const ridge = 1 - Math.abs(fbm(x * 0.012 + 1.7, z * 0.012 + 3.2, 3) * 2 - 1);
  h += ridge * 16;
  const valley = Math.abs(noise(x * 0.0035 + 99, z * 0.0035 + 77) * 2 - 1);
  h -= Math.pow(valley, 4) * 18;
  return h;
}
function addTree(x, z) {
  const h = sampleHeightJS(x, z);
  if (h < 3.8 || h > 28) return;
  const s = 0.6 + Math.random() * 1.6;
  const variant = Math.floor(Math.random() * treeSpriteMats.length);
  treeSprites.push({ x, z, h, s, variant });
}
function buildInstancedTrees() {
  for (const t of treeSprites) {
    if (treeSprites.length >= MAX_SPRITES) break;
    let sprite = spritePool.pop();
    if (!sprite) sprite = new THREE.Sprite(treeSpriteMats[t.variant]);
    sprite.material = treeSpriteMats[t.variant];
    sprite.position.set(t.x, t.h, t.z);
    sprite.scale.setScalar(t.s * 4);
    sprite.renderOrder = 1;
    scene.add(sprite);
  }
}

const rockGeom = new THREE.DodecahedronGeometry(0.45, 0);
const rockMat = new THREE.MeshStandardMaterial({ color: '#6e685f', roughness: 0.7, flatShading: true });
const rockInstanced = new THREE.InstancedMesh(rockGeom, rockMat, 2000);
scene.add(rockInstanced);
const groundData = [];
function addGround(x, z) {
  const h = sampleHeightJS(x, z);
  if (h < 3.8 || h > 27) return;
  if (Math.random() > 0.42) return;
  const s = 0.5 + Math.random() * 2.2;
  const rot = Math.random() * Math.PI * 2;
  groundData.push({ x, z, h, s, rot, rock: Math.random() > 0.4 });
}
function buildGround() {
  let ri = 0;
  const dm = new THREE.Object3D();
  for (const g of groundData) {
    dm.position.set(g.x, g.h + (g.rock ? 0.14 : 0.28), g.z);
    dm.scale.setScalar(g.s);
    dm.rotation.set(g.rock ? 0 : 1.3, g.rot, g.rock ? g.rot : 0);
    dm.updateMatrix();
    if (g.rock && ri < 2000) rockInstanced.setMatrixAt(ri++, dm.matrix);
  }
  rockInstanced.count = ri;
  rockInstanced.instanceMatrix.needsUpdate = true;
}

const step = 5.5;
for (let x = -CHUNKS_RADIUS; x <= CHUNKS_RADIUS; x++) {
  for (let z = -CHUNKS_RADIUS; z <= CHUNKS_RADIUS; z++) {
    for (let lx = -CHUNK/2; lx < CHUNK/2; lx += step) {
      for (let lz = -CHUNK/2; lz < CHUNK/2; lz += step) {
        if (Math.random() > 0.52) continue;
        const wx = x * CHUNK + lx + (Math.random() - 0.5) * step;
        const wz = z * CHUNK + lz + (Math.random() - 0.5) * step;
        addTree(wx, wz);
        addGround(wx, wz);
      }
    }
  }
}
// ============================================================
// WALK STATE
// ============================================================
const state = { speed: 4.2, distance: 0, yaw: 0, pitch: 0.42, bob: 0, sway: 0 };
// ============================================================
// STARTUP — defer heavy work to first paint, then start the loop
// ============================================================
requestAnimationFrame(() => {
  try {
    buildInstancedTrees();
    buildGround();
    initRoad();
  } finally {
    loading.classList.add('hidden');
    tick();
  }
});
// safety net: hide loading after 4s even if init stalls
setTimeout(() => loading.classList.add('hidden'), 4000);
let dragging = false;
let prevMouse = { x: 0, y: 0 };
canvas.addEventListener('pointerdown', (e) => { dragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; canvas.setPointerCapture(e.pointerId); });
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  state.yaw -= (e.clientX - prevMouse.x) * 0.004;
  state.pitch -= (e.clientY - prevMouse.y) * 0.004;
  state.pitch = Math.max(-0.25, Math.min(1.25, state.pitch));
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
});
window.addEventListener('wheel', (e) => {
  state.speed *= e.deltaY < 0 ? 1.08 : 0.92;
  state.speed = Math.max(1.0, Math.min(24, state.speed));
  paceEl.textContent = (state.speed / 4.2).toFixed(1) + 'x';
}, { passive: true });

// biome label
const BIOME_NAMES = ['river valley','lowland meadow','mixed forest','high grass','rocky ridge','alpine snow'];
function classifyBiome(h, slope) {
  if (h > 38 && slope < 0.25) return 'alpine snow';
  if (h > 32) return 'rocky ridge';
  if (h > 24 && slope < 0.35) return 'high grass';
  if (slope > 0.6) return 'rocky ridge';
  if (h < 8.5) return 'river valley';
  return 'mixed forest';
}

// ============================================================
// LOOP
// ============================================================
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(clock.getDelta(), 0.1);
  const time = clock.elapsedTime;
  const fwd = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, state.yaw, 0));
  camera.position.addScaledVector(fwd, state.speed * dt);
  state.distance += state.speed * dt;

  const ground = sampleHeightJS(camera.position.x, camera.position.z);
  const targetY = ground + 3.3;
  camera.position.y += (targetY - camera.position.y) * Math.min(dt * 4.0, 1);
  state.yaw += Math.sin(time * 0.25) * dt * 0.03;

  camera.rotation.order = 'YXZ';
  camera.rotation.y = state.yaw;
  camera.rotation.x = state.pitch;

  water.position.x = camera.position.x;
  water.position.z = camera.position.z;
  skyMesh.position.copy(camera.position);

  const cx = Math.round(camera.position.x / CHUNK);
  const cz = Math.round(camera.position.z / CHUNK);
  desiredSet.clear();
  for (let x = cx - CHUNKS_RADIUS; x <= cx + CHUNKS_RADIUS; x++)
    for (let z = cz - CHUNKS_RADIUS; z <= cz + CHUNKS_RADIUS; z++) {
      desiredSet.add(chunkKey(x, z));
      ensureChunk(x, z);
    }
  for (const [key] of chunks) if (!desiredSet.has(key)) removeChunk(...key.split(',').map(Number));

  const info = getRoadInfoAt(camera.position.x, camera.position.z);
  if (info) {
    const lateral = new THREE.Vector3().crossVectors(fwd, info.tangent).dot(new THREE.Vector3().crossVectors(fwd, info.right));
    const softness = Math.max(0, 1 - Math.abs(info.dist) / (ROAD_WIDTH * 2.2));
    const steer = Math.sin(time * 0.35) * 0.6 + Math.sin(time * 0.7) * 0.4;
    const targetLateral = steer * softness * dt * 3.0;
    camera.position.addScaledVector(info.right, targetLateral);
    const bank = info.tangent.clone().cross(info.up).dot(info.right) * 0.35;
    state.yaw += bank * dt * 0.5;
  }

  distEl.textContent = (state.distance / 1000).toFixed(2);
  elevEl.textContent = Math.round(ground * 10) / 10;
  const hAhead = sampleHeightJS(camera.position.x + 1, camera.position.z);
  const slope = Math.min(Math.abs(hAhead - ground) / 3.0, 1.0);
  biomeEl.textContent = classifyBiome(ground, Math.max(0, 1 - sampleHeightJS(camera.position.x+1, camera.position.z)));

  terrainMaterial.uniforms.uTime.value = time;
  waterMaterial.uniforms.uTime.value = time;
  skyMaterial.uniforms.uTime.value = time;
  if (roadMesh) roadMesh.material.uniforms.uTime.value = time;

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
