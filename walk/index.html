<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk — Limitless Labs</title>
<link rel="stylesheet" href="../style.css?v=3">
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b0d0f}
  #walk-canvas{position:fixed;inset:0;display:block;width:100%;height:100%}
  .walk-ui{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
  .walk-chip{background:rgba(11,13,15,.55);border:1px solid rgba(224,167,67,.25);color:#e6e6e6;padding:10px 14px;border-radius:999px;backdrop-filter:blur(6px);font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  .walk-chip .accent{color:#e0a743}
  .walk-hint{position:fixed;left:50%;top:16px;transform:translateX(-50%);color:#cfd3d6;background:rgba(11,13,15,.45);border:1px solid rgba(224,167,67,.18);padding:8px 12px;border-radius:10px;backdrop-filter:blur(6px);font:12px/1.3 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;z-index:10;opacity:.9}
  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0b0d0f;color:#e0a743;font:14px/1.2 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;z-index:20;transition:opacity .8s}
  .loading.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="walk-canvas" aria-label="Procedural infinite walk through a national park landscape"></canvas>
<div class="loading" id="loading">GENERATING WORLD...</div>
<div class="walk-hint">Click &amp; drag to look &nbsp;·&nbsp; Walk automatically &nbsp;·&nbsp; Scroll to adjust pace</div>
<div class="walk-ui">
  <div class="walk-chip">PACE <span class="accent" id="pace">1.0x</span></div>
  <div class="walk-chip">DIST <span class="accent" id="dist">0.00</span> <span style="opacity:.7">km</span></div>
  <div class="walk-chip">ELEV <span class="accent" id="elev">0</span> <span style="opacity:.7">m</span></div>
</div>

<script type="importmap">
{ "imports": { "three": "../vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('walk-canvas');
const loading = document.getElementById('loading');
const paceEl = document.getElementById('pace');
const distEl = document.getElementById('dist');
const elevEl = document.getElementById('elev');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.5, 600);
camera.position.set(0, 3.6, 0);

// ============================================================
// TEXTURES (tiling, triplanar-ready)
// ============================================================
function createCanvas(size = 512) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  return { canvas: c, ctx: c.getContext('2d'), size };
}
function addNoise(ctx, size, intensity = 18) {
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * intensity;
    d[i] = Math.max(0, Math.min(255, d[i] + n));
    d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + n));
    d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + n));
  }
  ctx.putImageData(img, 0, 0);
}
function makeNormalMap(size = 512, strength = 2.8) {
  const { canvas: c, ctx } = createCanvas(size);
  ctx.fillStyle = '#8080ff';
  ctx.fillRect(0, 0, size, size);
  addNoise(ctx, size, 40);
  const img = ctx.getImageData(0, 0, size, size);
  const d = img.data;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const idx = (y * size + x) * 4;
      const l = d[idx], r = d[((y * size) + ((x + 1) % size)) * 4];
      const u = d[idx], dn = d[((((y + 1) % size) * size) + x) * 4];
      const dx = (l - r) / 255 * strength;
      const dy = (u - dn) / 255 * strength;
      d[idx] = Math.max(0, Math.min(255, 128 + dx * 127));
      d[idx + 1] = Math.max(0, Math.min(255, 128 + dy * 127));
      d[idx + 2] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
function makeRoughnessMap(size = 512, base = 0.8, variance = 0.2) {
  const { canvas: c, ctx } = createCanvas(size);
  ctx.fillStyle = `rgb(${Math.round(base*255)},${Math.round(base*255)},${Math.round(base*255)})`;
  ctx.fillRect(0, 0, size, size);
  addNoise(ctx, size, variance * 255);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
function makeGrassTexture(size = 512) {
  const { canvas: c, ctx } = createCanvas(size);
  ctx.fillStyle = '#4f6632';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 30000; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    ctx.fillStyle = `rgba(${70 + Math.random()*35},${95 + Math.random()*40},${35 + Math.random()*30},0.6)`;
    ctx.fillRect(x, y, 1 + Math.random() * 2, 2 + Math.random() * 5);
  }
  addNoise(ctx, size, 10);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
function makeRockTexture(size = 512) {
  const { canvas: c, ctx } = createCanvas(size);
  ctx.fillStyle = '#7a7268';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 12000; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    ctx.fillStyle = `rgba(${115 + Math.random()*50},${105 + Math.random()*40},${95 + Math.random()*35},0.55)`;
    ctx.fillRect(x, y, 2 + Math.random() * 10, 2 + Math.random() * 8);
  }
  addNoise(ctx, size, 18);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
function makeDirtTexture(size = 512) {
  const { canvas: c, ctx } = createCanvas(size);
  ctx.fillStyle = '#6b604a';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 18000; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    ctx.fillStyle = `rgba(${95 + Math.random()*30},${85 + Math.random()*25},${60 + Math.random()*25},0.45)`;
    ctx.fillRect(x, y, 1 + Math.random() * 3, 1 + Math.random() * 3);
  }
  addNoise(ctx, size, 12);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
function makeSnowTexture(size = 512) {
  const { canvas: c, ctx } = createCanvas(size);
  ctx.fillStyle = '#e8ecf2';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 24000; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.35})`;
    ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 2);
  }
  addNoise(ctx, size, 10);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const grassTex = makeGrassTexture();
const rockTex = makeRockTexture();
const dirtTex = makeDirtTexture();
const snowTex = makeSnowTexture();
const grassNormal = makeNormalMap(512, 2.2);
const rockNormal = makeNormalMap(512, 3.8);
const grassRoughness = makeRoughnessMap(512, 0.82, 0.15);
const rockRoughness = makeRoughnessMap(512, 0.52, 0.28);

// ============================================================
// SKY / ATMOSPHERE
// ============================================================
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 2; skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
const skyGrad = skyCtx.createLinearGradient(0, 0, 0, 512);
skyGrad.addColorStop(0.0, '#3e5f82');
skyGrad.addColorStop(0.22, '#6d8fad');
skyGrad.addColorStop(0.5, '#a8bfcf');
skyGrad.addColorStop(0.72, '#cfc3aa');
skyGrad.addColorStop(0.88, '#b8956e');
skyGrad.addColorStop(1.0, '#7a5f42');
skyCtx.fillStyle = skyGrad;
skyCtx.fillRect(0, 0, 2, 512);
const skyTex = new THREE.CanvasTexture(skyCanvas);
skyTex.mapping = THREE.EquirectangularReflectionMapping;
scene.background = skyTex;
scene.fog = new THREE.FogExp2('#b8c8d2', 0.0016);

// ============================================================
// LIGHTING
// ============================================================
const sun = new THREE.DirectionalLight('#fff3d6', 2.4);
sun.position.set(160, 110, -70);
scene.add(sun);
scene.add(new THREE.DirectionalLight('#ffe4c4', 0.35).position.set(-60, 40, 50) && new THREE.DirectionalLight('#ffe4c4', 0.35));
scene.add(new THREE.HemisphereLight('#b4cde0', '#4f5e42', 0.75));

// ============================================================
// NOISE / HEIGHT
// ============================================================
function hash(x, z) {
  let n = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453;
  return n - Math.floor(n);
}
function smooth(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + (b - a) * t; }
function noise(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = smooth(x - ix), fz = smooth(z - iz);
  return lerp(lerp(hash(ix, iz), hash(ix + 1, iz), fx), lerp(hash(ix, iz + 1), hash(ix + 1, iz + 1), fx), fz);
}
function fbm(x, z, oct = 4) {
  let v = 0, a = 0.5, f = 1;
  for (let i = 0; i < oct; i++) { v += a * noise(x * f, z * f); a *= 0.5; f *= 2.15; }
  return v;
}
function sampleHeight(x, z) {
  let h = 0;
  h += fbm(x * 0.009, z * 0.009, 4) * 26;
  h += fbm(x * 0.038 + 5.3, z * 0.038 + 9.1, 3) * 7;
  const ridge = 1 - Math.abs(fbm(x * 0.014 + 1.7, z * 0.014 + 3.2, 3) * 2 - 1);
  h += ridge * 13;
  // valley carve
  const valley = Math.abs(noise(x * 0.004 + 99, z * 0.004 + 77) * 2 - 1);
  h -= Math.pow(valley, 4) * 14;
  return h;
}

// ============================================================
// TERRAIN — triplanar-ish blended material per chunk
// ============================================================
const CHUNK = 100;
const SEG = 90;
const TEX_SCALE = 0.16;

function buildChunkMesh(cx, cz) {
  const geom = new THREE.PlaneGeometry(CHUNK, CHUNK, SEG, SEG);
  geom.rotateX(-Math.PI / 2);
  const pos = geom.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const ao = new Float32Array(pos.count);
  const roughness = new Float32Array(pos.count);
  const uv = new Float32Array(pos.count * 2);

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i) + cx;
    const z = pos.getZ(i) + cz;
    let h = sampleHeight(x, z);
    pos.setY(i, h);

    const t = Math.max(0, Math.min(1, (h - 1) / 42));
    let col = new THREE.Color('#4f6632');
    let r = 0.85;

    // biome blend inspired by real elevation bands
    if (t > 0.3) col.lerp(new THREE.Color('#6e8040'), (t - 0.3) / 0.2);
    if (t > 0.5) {
      const m = (t - 0.5) / 0.25;
      col.lerp(new THREE.Color('#8a7e6e'), m);
      r = 0.6 - m * 0.1;
    }
    if (t > 0.65) {
      const m = Math.min(1, (t - 0.65) / 0.2);
      col.lerp(new THREE.Color('#7a7268'), m);
      r = 0.45;
    }
    if (t > 0.82) {
      const m = Math.min(1, (t - 0.82) / 0.18);
      col.lerp(new THREE.Color('#e0e4ec'), m);
      r = 0.7;
    }

    // slope darkening / AO approximation
    const ridge = 1 - Math.abs(fbm(x * 0.016 + 1.7, z * 0.016 + 3.2, 3) * 2 - 1);
    const slope = Math.abs(ridge);
    col.multiplyScalar(1 - slope * 0.25);
    ao[i] = 1 - slope * 0.4;
    roughness[i] = r + slope * 0.15;

    colors[i * 3] = col.r;
    colors[i * 3 + 1] = col.g;
    colors[i * 3 + 2] = col.b;
    uv[i * 2] = (x * TEX_SCALE) % 1;
    uv[i * 2 + 1] = (z * TEX_SCALE) % 1;
  }
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geom.setAttribute('ao', new THREE.BufferAttribute(ao, 1));
  geom.setAttribute('roughness', new THREE.BufferAttribute(roughness, 1));
  geom.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geom.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    roughness: 0.8,
    metalness: 0.02,
    flatShading: true,
    vertexColors: true,
  });
  mat.onBeforeCompile = (shader) => {
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <common>',
      `#include <common>
      varying float vAO;
      varying float vRough;`
    );
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <lights_physical_fragment>',
      `#include <lights_physical_fragment>
      rough = clamp(rough + vRough * 0.35, 0.28, 0.95);`
    );
  };

  return new THREE.Mesh(geom, mat);
}

// ============================================================
// WATER
// ============================================================
const waterGeom = new THREE.PlaneGeometry(CHUNK * 5, CHUNK * 5);
waterGeom.rotateX(-Math.PI / 2);
const waterMat = new THREE.MeshPhysicalMaterial({
  color: '#3b5d72',
  roughness: 0.02,
  metalness: 0.08,
  transparent: true,
  opacity: 0.7,
  clearcoat: 0.2,
});
const water = new THREE.Mesh(waterGeom, waterMat);
water.position.y = 2.4;
scene.add(water);

// ============================================================
// VEGETATION — elevation-aware, multi-species
// ============================================================
const trunkGeom = new THREE.CylinderGeometry(0.18, 0.3, 2.0, 6);
const foliageGeom = new THREE.ConeGeometry(1.2, 3.2, 7, 1);
const foliageAltGeom = new THREE.ConeGeometry(1.0, 2.6, 6, 1);
const trunkMat = new THREE.MeshStandardMaterial({ color: '#4a3b2f', roughness: 0.92 });
const foliageMats = [
  new THREE.MeshStandardMaterial({ color: '#2f4025', roughness: 0.88 }),
  new THREE.MeshStandardMaterial({ color: '#3a4f30', roughness: 0.88 }),
  new THREE.MeshStandardMaterial({ color: '#263820', roughness: 0.9 }),
  new THREE.MeshStandardMaterial({ color: '#4a5a3a', roughness: 0.86 }),
];

const MAX_TREES = 8000;
const trunkInstanced = new THREE.InstancedMesh(trunkGeom, trunkMat, MAX_TREES);
const foliageInstanced = new THREE.InstancedMesh(foliageGeom, foliageMats[0], MAX_TREES * 2);
trunkInstanced.castShadow = false;
foliageInstanced.castShadow = false;
scene.add(trunkInstanced);
scene.add(foliageInstanced);

const dummy = new THREE.Object3D();
const treeData = [];

function addTree(x, z) {
  const h = sampleHeight(x, z);
  if (h < 2.8 || h > 26) return;
  const s = 0.65 + Math.random() * 1.35;
  const rot = Math.random() * Math.PI * 2;
  const matIdx = Math.floor(Math.random() * foliageMats.length);
  const wide = Math.random() > 0.55;
  treeData.push({ x, z, h, s, rot, matIdx, wide });
}

function buildInstancedTrees() {
  let ti = 0, fi = 0;
  for (const t of treeData) {
    if (ti >= MAX_TREES) break;
    dummy.position.set(t.x, t.h, t.z);
    dummy.scale.setScalar(t.s);
    dummy.rotation.y = t.rot;
    dummy.updateMatrix();
    trunkInstanced.setMatrixAt(ti++, dummy.matrix);
    dummy.position.set(t.x, t.h + 1.0, t.z);
    dummy.scale.setScalar(t.s);
    dummy.rotation.y = t.rot;
    dummy.updateMatrix();
    foliageInstanced.setMatrixAt(fi++, dummy.matrix);
    dummy.position.set(t.x, t.h + 2.5, t.z);
    dummy.scale.setScalar(t.wide ? t.s * 0.85 : t.s * 0.65);
    dummy.rotation.y = t.rot + 0.35;
    dummy.updateMatrix();
    foliageInstanced.setMatrixAt(fi++, dummy.matrix);
  }
  trunkInstanced.count = ti;
  trunkInstanced.instanceMatrix.needsUpdate = true;
  foliageInstanced.count = fi;
  foliageInstanced.instanceMatrix.needsUpdate = true;
}

// ============================================================
// GROUND COVER — rocks and low bushes (instanced)
// ============================================================
const rockGeom = new THREE.DodecahedronGeometry(0.35, 0);
const rockMat = new THREE.MeshStandardMaterial({ color: '#6e685f', roughness: 0.75, flatShading: true });
const rockInstanced = new THREE.InstancedMesh(rockGeom, rockMat, 4000);
scene.add(rockInstanced);

const bushGeom = new THREE.SphereGeometry(0.4, 5, 4);
const bushMat = new THREE.MeshStandardMaterial({ color: '#3a4f30', roughness: 0.9, flatShading: true });
const bushInstanced = new THREE.InstancedMesh(bushGeom, bushMat, 3000);
scene.add(bushInstanced);

const groundData = [];
function addGround(x, z) {
  const h = sampleHeight(x, z);
  if (h < 3.2 || h > 23) return;
  if (Math.random() > 0.35) return;
  const s = 0.6 + Math.random() * 1.6;
  const rot = Math.random() * Math.PI * 2;
  groundData.push({ x, z, h, s, rot, rock: Math.random() > 0.45 });
}
function buildGround() {
  let ri = 0, bi = 0;
  const dm = dummy;
  for (const g of groundData) {
    dm.position.set(g.x, g.h + (g.rock ? 0.08 : 0.18), g.z);
    dm.scale.setScalar(g.s);
    dm.rotation.set(g.rock ? 0 : 1.2, g.rot, g.rock ? g.rot : 0);
    dm.updateMatrix();
    if (g.rock && ri < 4000) rockInstanced.setMatrixAt(ri++, dm.matrix);
    else if (!g.rock && bi < 3000) bushInstanced.setMatrixAt(bi++, dm.matrix);
  }
  rockInstanced.count = ri;
  rockInstanced.instanceMatrix.needsUpdate = true;
  bushInstanced.count = bi;
  bushInstanced.instanceMatrix.needsUpdate = true;
}

// ============================================================
// CHUNK MANAGEMENT
// ============================================================
const CHUNKS_RADIUS = 2;
const chunks = new Map();
function chunkKey(cx, cz) { return `${cx},${cz}`; }
function ensureChunk(cx, cz) {
  const key = chunkKey(cx, cz);
  if (chunks.has(key)) return;
  const mesh = buildChunkMesh(cx * CHUNK, cz * CHUNK);
  scene.add(mesh);
  chunks.set(key, mesh);

  const step = 7;
  for (let lx = -CHUNK / 2; lx < CHUNK / 2; lx += step) {
    for (let lz = -CHUNK / 2; lz < CHUNK / 2; lz += step) {
      if (Math.random() > 0.62) continue;
      const wx = cx * CHUNK + lx + (Math.random() - 0.5) * step;
      const wz = cz * CHUNK + lz + (Math.random() - 0.5) * step;
      addTree(wx, wz);
      addGround(wx, wz);
    }
  }
}
function removeChunk(cx, cz) {
  const key = chunkKey(cx, cz);
  const mesh = chunks.get(key);
  if (!mesh) return;
  scene.remove(mesh);
  mesh.geometry.dispose();
  mesh.material.dispose();
  chunks.delete(key);
}

for (let x = -CHUNKS_RADIUS; x <= CHUNKS_RADIUS; x++)
  for (let z = -CHUNKS_RADIUS; z <= CHUNKS_RADIUS; z++) ensureChunk(x, z);
buildInstancedTrees();
buildGround();

// ============================================================
// WALK STATE
// ============================================================
const state = { speed: 4.0, distance: 0, yaw: 0, pitch: 0.38, bob: 0, sway: 0 };
let dragging = false;
let prevMouse = { x: 0, y: 0 };
canvas.addEventListener('pointerdown', (e) => { dragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; canvas.setPointerCapture(e.pointerId); });
window.addEventListener('pointerup', () => { dragging = false; });
window.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  state.yaw -= (e.clientX - prevMouse.x) * 0.004;
  state.pitch -= (e.clientY - prevMouse.y) * 0.004;
  state.pitch = Math.max(-0.3, Math.min(1.2, state.pitch));
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
});
window.addEventListener('wheel', (e) => {
  state.speed *= e.deltaY < 0 ? 1.08 : 0.92;
  state.speed = Math.max(1.0, Math.min(22, state.speed));
  paceEl.textContent = (state.speed / 4.0).toFixed(1) + 'x';
}, { passive: true });

// ============================================================
// LOOP
// ============================================================
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(clock.getDelta(), 0.1);
  const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, state.yaw, 0));
  camera.position.addScaledVector(forward, state.speed * dt);
  state.distance += state.speed * dt;

  const ground = sampleHeight(camera.position.x, camera.position.z);
  const targetY = ground + 2.7;
  camera.position.y += (targetY - camera.position.y) * Math.min(dt * 3.4, 1);
  state.bob += dt * state.speed * 1.35;
  const bobY = Math.sin(state.bob) * 0.2;
  const swayX = Math.cos(state.bob * 0.65) * 0.07;
  state.sway += (swayX - state.sway) * Math.min(dt * 8, 1);
  camera.position.y += bobY;
  camera.position.x += state.sway;

  camera.rotation.order = 'YXZ';
  camera.rotation.y = state.yaw;
  camera.rotation.x = state.pitch;

  water.position.x = camera.position.x;
  water.position.z = camera.position.z;
  waterMat.opacity = 0.66 + Math.sin(clock.elapsedTime * 0.55) * 0.04;

  const cx = Math.round(camera.position.x / CHUNK);
  const cz = Math.round(camera.position.z / CHUNK);
  const desired = new Set();
  for (let x = cx - CHUNKS_RADIUS; x <= cx + CHUNKS_RADIUS; x++)
    for (let z = cz - CHUNKS_RADIUS; z <= cz + CHUNKS_RADIUS; z++) {
      desired.add(chunkKey(x, z));
      ensureChunk(x, z);
    }
  for (const [key] of chunks) if (!desired.has(key)) removeChunk(...key.split(',').map(Number));

  distEl.textContent = (state.distance / 1000).toFixed(2);
  elevEl.textContent = Math.round(camera.position.y * 10) / 10;
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

loading.classList.add('hidden');
tick();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
